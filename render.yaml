# render.yaml — One-click deploy for Render
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: guru-ai
    runtime: python
    buildCommand: "bash ./build.sh"
    startCommand: "cd backend && gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true      # Render auto-generates a secure random string
      - key: GOOGLE_API_KEY
        sync: false               # You can keep this empty if using OpenRouter
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false               # Set this manually in the Render dashboard
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: USE_MOCK
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.18.0"
